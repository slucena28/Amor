<!DOCTYPE html>

<link rel="stylesheet" href="style.css">

<body>

        <a class="play"

</div>

<div class="playlist">

    <img src="imagens/praia.jpg">

    <div>
        <h3>Be Quiet and Drive (Far Away)</h3>
